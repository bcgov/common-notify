# Reusable vars
x-var:
  - &POSTGRES_USER postgres
  - &POSTGRES_PASSWORD default
  - &POSTGRES_DATABASE postgres
  - &node-image node:22

# Reusable envars for postgres
x-postgres-vars: &postgres-vars
  POSTGRES_HOST: database
  POSTGRES_USER: *POSTGRES_USER
  POSTGRES_PASSWORD: *POSTGRES_PASSWORD
  POSTGRES_DATABASE: *POSTGRES_DATABASE

services:
  database:
    image: postgis/postgis:17-3.4 # if using crunchy , make sure to align with crunchy version, currently it is at 16 and postgis 3.3
    container_name: database
    environment:
      <<: *postgres-vars
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', *POSTGRES_USER]
    ports: ['5432:5432']

  migrations:
    image: flyway/flyway:12-alpine
    container_name: migrations
    command: info migrate info
    volumes:
      - '../migrations/sql:/flyway/sql:ro'
      - './migrations/dev:/flyway/dev:ro'
    environment:
      FLYWAY_URL: jdbc:postgresql://database:5432/postgres
      FLYWAY_USER: *POSTGRES_USER
      FLYWAY_PASSWORD: *POSTGRES_PASSWORD
      FLYWAY_BASELINE_ON_MIGRATE: true
      FLYWAY_DEFAULT_SCHEMA: notify
      # For development, include both main and dev migrations
      # For production, set: FLYWAY_LOCATIONS=filesystem:/flyway/sql
      FLYWAY_LOCATIONS: 'filesystem:/flyway/sql,filesystem:/flyway/dev'
      NODE_ENV: development
    depends_on:
      database:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: redis
    ports: ['6379:6379']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  schemaspy:
    image: schemaspy/schemaspy:7.0.2
    profiles: ['schemaspy']
    container_name: schemaspy
    command:
      -t pgsql11 -db postgres -host database -port 5432 -u postgres -p default -schemas notify
    depends_on:
      migrations:
        condition: service_completed_successfully
    volumes: ['./output:/output']

  backend:
    container_name: backend
    depends_on:
      migrations:
        condition: service_started
      redis:
        condition: service_healthy
      kong:
        condition: service_healthy
    entrypoint: sh -c "npm i && npm run start:dev"
    environment:
      <<: *postgres-vars
      NODE_ENV: development
      KONG_ADMIN_URL: http://kong:8001
      GC_NOTIFY_BASE_URL: ${GC_NOTIFY_BASE_URL:-https://api.notification.canada.ca}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
    image: *node-image
    ports: ['3001:3000']
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/api']
    working_dir: '/app'
    volumes: ['../backend:/app', '/app/node_modules']

  frontend:
    container_name: frontend
    entrypoint: sh -c "npm ci --ignore-scripts && npm run dev"
    environment:
      BACKEND_URL: http://backend:3000
      PORT: 3000
      NODE_ENV: development
      VITE_API_GATEWAY_NOTIFY_URL: http://kong:8000
    image: *node-image
    ports: ['3000:3000']
    volumes: ['../frontend:/app', '/app/node_modules']
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000']
    working_dir: '/app'
    depends_on:
      backend:
        condition: service_healthy

  caddy:
    container_name: caddy
    profiles: ['caddy']
    build: ../frontend
    environment:
      NODE_ENV: development
      PORT: 3000
      BACKEND_URL: http://backend:3000
      LOG_LEVEL: info
    ports: ['3005:3000']
    volumes: ['../frontend/Caddyfile:/etc/caddy/Caddyfile']
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000']
    depends_on:
      backend:
        condition: service_healthy

  # Kong API Gateway
  kong-migrations:
    image: kong:latest
    container_name: kong-migrations
    platform: linux/amd64
    command: kong migrations bootstrap
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: database
      KONG_PG_USER: *POSTGRES_USER
      KONG_PG_PASSWORD: *POSTGRES_PASSWORD
      KONG_PG_DATABASE: kong
      KONG_PG_PORT: 5432
    depends_on:
      migrations:
        condition: service_completed_successfully

  kong:
    image: kong:latest
    container_name: kong
    platform: linux/amd64
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: database
      KONG_PG_USER: *POSTGRES_USER
      KONG_PG_PASSWORD: *POSTGRES_PASSWORD
      KONG_PG_DATABASE: kong
      KONG_PG_PORT: 5432
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    ports:
      - '8000:8000' # Proxy port
      - '8001:8001' # Admin API port
    depends_on:
      kong-migrations:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD', 'kong', 'health']
      interval: 10s
      timeout: 5s
      retries: 5

  # Kong Seed Data - Creates test tenants and API keys
  # Mock OAuth2 Token Server
  oauth2-mock:
    image: *node-image
    container_name: oauth2-mock
    working_dir: /app
    entrypoint: sh -c "npm install && npm start"
    environment:
      NODE_ENV: development
      PORT: 3002
    ports: ['3002:3002']
    volumes:
      - ./oauth2-mock-server.js:/app/server.js
      - ./oauth2-mock-package.json:/app/package.json
      - /app/node_modules
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3002/health']
    depends_on:
      database:
        condition: service_healthy

  kong-seed:
    image: curlimages/curl:latest
    container_name: kong-seed
    entrypoint: /bin/sh
    command: /kong-seed.sh
    volumes:
      - ./kong-seed.sh:/kong-seed.sh:ro
    depends_on:
      kong:
        condition: service_healthy
      oauth2-mock:
        condition: service_healthy
