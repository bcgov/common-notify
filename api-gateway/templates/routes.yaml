      - GET
    strip_path: false
    https_redirect_status_code: 426
    path_handling: v0
    request_buffering: true
    response_buffering: true
  - name: ${ROUTE_PREFIX}notify-list
    tags: [ns.${GATEWAY_ID}, env.${ENVIRONMENT}]
    hosts:
      - ${GATEWAY_HOSTNAME}
    paths:
      - /api/v1/notify
    methods:
      - GET
      - DELETE
    strip_path: false
    https_redirect_status_code: 426
    path_handling: v0
    request_buffering: true
    response_buffering: true
  - name: ${ROUTE_PREFIX}notify-status
    tags: [ns.${GATEWAY_ID}, env.${ENVIRONMENT}]
    hosts:
      - ${GATEWAY_HOSTNAME}
    paths:
      - /api/v1/notify/status
    methods:
      - GET
    strip_path: false
    https_redirect_status_code: 426
    path_handling: v0
    request_buffering: true
    response_buffering: true
  - name: ${ROUTE_PREFIX}notify-callbacks
    tags: [ns.${GATEWAY_ID}, env.${ENVIRONMENT}]
    hosts:
      - ${GATEWAY_HOSTNAME}
    paths:
      - /api/v1/notify/registerCallback
    methods:
      - POST
      - PATCH
      - DELETE
    strip_path: false
    https_redirect_status_code: 426
    path_handling: v0
    request_buffering: true
    response_buffering: true
  - name: ${ROUTE_PREFIX}templates
    tags: [ns.${GATEWAY_ID}, env.${ENVIRONMENT}]
    hosts:
      - ${GATEWAY_HOSTNAME}
    paths:
      - /api/v1/templates
    methods:
      - GET
    strip_path: false
    https_redirect_status_code: 426
    path_handling: v0
    request_buffering: true
    response_buffering: true
plugins:
  - name: jwt-keycloak
    tags: [ns.${GATEWAY_ID}, env.${ENVIRONMENT}]
    enabled: true
    route: ${ROUTE_PREFIX}ches-email
    config:
      allowed_iss:
        - ${KEYCLOAK_ISSUER}
      allowed_aud: ${ALLOWED_AUDIENCE}
      run_on_preflight: true
      iss_key_grace_period: 10
      maximum_expiration: 0
      algorithm: RS256
      claims_to_verify:
        - exp
      uri_param_names:
        - jwt
      cookie_names: []
      scope: null
      roles: null
      realm_roles: null
      client_roles: null
      anonymous: null
      consumer_match: true
      consumer_match_claim: azp
      consumer_match_claim_custom_id: true
      consumer_match_ignore_not_found: false
  - name: jwt-keycloak
    tags: [ns.${GATEWAY_ID}, env.${ENVIRONMENT}]
