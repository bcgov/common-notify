  - name: request-transformer
    tags: [ns.${GATEWAY_ID}, env.${ENVIRONMENT}]
    enabled: true
    config:
      http_method: null
      add:
        headers:
          - X-Consumer-Username:$(consumer_username)
          - X-Consumer-ID:$(consumer_id)
---
kind: CredentialIssuer
name: ${GATEWAY_ID} default ${ENVIRONMENT}
description: Default Authorization Profile for ${GATEWAY_ID} Gateway (${ENVIRONMENT})
flow: client-credentials
mode: auto
authPlugin: jwt-keycloak
clientAuthenticator: client-secret
clientRoles: []
inheritFrom: Gold Shared IdP
---
kind: Product
name: Notify API
dataset: ${GATEWAY_ID}-notify-dataset
environments:
  - name: dev
    active: true
    approval: false
    flow: client-credentials
    credentialIssuer: ${GATEWAY_ID} default dev
    services:
      - ${GATEWAY_ID}-notify-dev
  - name: test
    active: true
    approval: false
    flow: client-credentials
    credentialIssuer: ${GATEWAY_ID} default test
    services:
      - ${GATEWAY_ID}-notify-test
  - name: prod
    active: true
    approval: false
    flow: client-credentials
    credentialIssuer: ${GATEWAY_ID} default prod
    services:
      - ${GATEWAY_ID}-notify-prod
