kind: DraftDataset
name: ${GATEWAY_ID}-notify-dataset
title: Notify
organization: ministry-of-citizens-services
organizationUnit: devops-and-cloud-services
notes:
  A multi-tenant notification service for sending and scheduling email, SMS, and other messages via
  a unified API.
tags: [notify, openapi, notifications, email, sms]
license_title: Access Only
view_audience: Government
security_class: PUBLIC
record_publish_date: '2026-04-10'
---
kind: GatewayService
name: ${GATEWAY_SERVICE_NAME}
tags: [ns.${GATEWAY_ID}, env.${ENVIRONMENT}]
host: ${BACKEND_HOST}
port: 80
protocol: http
retries: 0
routes:
  - name: ${ROUTE_PREFIX}notify-health
    tags: [ns.${GATEWAY_ID}, env.${ENVIRONMENT}]
    hosts:
      - ${GATEWAY_HOSTNAME}
    paths:
      - /health
    methods:
      - GET
    strip_path: false
    https_redirect_status_code: 426
    path_handling: v0
    request_buffering: true
    response_buffering: true
  - name: ${ROUTE_PREFIX}notify-api-health
    tags: [ns.${GATEWAY_ID}, env.${ENVIRONMENT}]
    hosts:
      - ${GATEWAY_HOSTNAME}
    paths:
      - /api/health
    methods:
      - GET
    strip_path: false
    https_redirect_status_code: 426
    path_handling: v0
    request_buffering: true
    response_buffering: true
  - name: ${ROUTE_PREFIX}ches-email
    tags: [ns.${GATEWAY_ID}, env.${ENVIRONMENT}]
    hosts:
      - ${GATEWAY_HOSTNAME}
    paths:
      - /ches/api/v1/email
    methods:
      - POST
    strip_path: false
    https_redirect_status_code: 426
    path_handling: v0
    request_buffering: true
    response_buffering: true
  - name: ${ROUTE_PREFIX}notify-simple
    tags: [ns.${GATEWAY_ID}, env.${ENVIRONMENT}]
    hosts:
      - ${GATEWAY_HOSTNAME}
    paths:
      - /api/v1/notifysimple
    methods:
      - POST
    strip_path: false
    https_redirect_status_code: 426
    path_handling: v0
    request_buffering: true
    response_buffering: true
  - name: ${ROUTE_PREFIX}notify-event
    tags: [ns.${GATEWAY_ID}, env.${ENVIRONMENT}]
    hosts:
      - ${GATEWAY_HOSTNAME}
    paths:
      - /api/v1/notifyevent
    methods:
      - POST
    strip_path: false
    https_redirect_status_code: 426
    path_handling: v0
    request_buffering: true
    response_buffering: true
  - name: ${ROUTE_PREFIX}notify-event-preview
    tags: [ns.${GATEWAY_ID}, env.${ENVIRONMENT}]
    hosts:
      - ${GATEWAY_HOSTNAME}
    paths:
      - /api/v1/notifyevent/preview
    methods:
      - POST
    strip_path: false
    https_redirect_status_code: 426
    path_handling: v0
    request_buffering: true
    response_buffering: true
  - name: ${ROUTE_PREFIX}notify-event-types
    tags: [ns.${GATEWAY_ID}, env.${ENVIRONMENT}]
    hosts:
      - ${GATEWAY_HOSTNAME}
