  - name: jwt-keycloak
    tags: [ns.${GATEWAY_ID}, env.${ENVIRONMENT}]
    enabled: true
    route: ${ROUTE_PREFIX}ches-email
    config:
      allowed_iss:
        - ${KEYCLOAK_ISSUER}
      allowed_aud: ${ALLOWED_AUDIENCE}
      run_on_preflight: true
      iss_key_grace_period: 10
      maximum_expiration: 0
      algorithm: RS256
      claims_to_verify:
        - exp
      uri_param_names:
        - jwt
      cookie_names: []
      scope: null
      roles: null
      realm_roles: null
      client_roles: null
      anonymous: null
      consumer_match: true
      consumer_match_claim: azp
      consumer_match_claim_custom_id: true
