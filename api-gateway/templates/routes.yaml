kind: GatewayService
name: ${GATEWAY_SERVICE_NAME}
tags: [ns.${GATEWAY_ID}, env.${ENVIRONMENT}]
host: ${BACKEND_HOST}
port: 80
protocol: http
retries: 0
routes:
  # ============================================================================
  # PUBLIC ROUTES - No authentication required
  # ============================================================================
  - name: ${ROUTE_PREFIX}notify-health
    tags: [ns.${GATEWAY_ID}, env.${ENVIRONMENT}]
    hosts:
      - ${GATEWAY_HOSTNAME}
    paths:
      - /health
    methods:
      - GET
    strip_path: false
    https_redirect_status_code: 426
    path_handling: v0
    request_buffering: true
    response_buffering: true
  - name: ${ROUTE_PREFIX}notify-api-health
    tags: [ns.${GATEWAY_ID}, env.${ENVIRONMENT}]
    hosts:
      - ${GATEWAY_HOSTNAME}
    paths:
      - /api/health
    methods:
      - GET
    strip_path: false
    https_redirect_status_code: 426
    path_handling: v0
    request_buffering: true
    response_buffering: true

  # ============================================================================
  # SERVICE-TO-SERVICE ROUTES (Client Credentials)
  # Routes that can only be called by backend services using service tokens
  # ============================================================================
  - name: ${ROUTE_PREFIX}ches-email
    tags: [ns.${GATEWAY_ID}, env.${ENVIRONMENT}]
