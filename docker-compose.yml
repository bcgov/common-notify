# Reusable vars
x-var:
  - &POSTGRES_USER postgres
  - &POSTGRES_PASSWORD default
  - &POSTGRES_DATABASE postgres
  - &node-image node:22

# Reusable envars for postgres
x-postgres-vars: &postgres-vars
  POSTGRES_HOST: database
  POSTGRES_USER: *POSTGRES_USER
  POSTGRES_PASSWORD: *POSTGRES_PASSWORD
  POSTGRES_DATABASE: *POSTGRES_DATABASE

services:
  database:
    image: postgis/postgis:17-3.4 # if using crunchy , make sure to align with crunchy version, currently it is at 16 and postgis 3.3
    container_name: database
    environment:
      <<: *postgres-vars
    healthcheck:
      test: ["CMD", "pg_isready", "-U", *POSTGRES_USER]
    ports: ["5432:5432"]

  migrations:
    image: flyway/flyway:12-alpine
    container_name: migrations
    command: info migrate info
    volumes: ["./migrations/sql:/flyway/sql:ro"]
    environment:
      FLYWAY_URL: jdbc:postgresql://database:5432/postgres
      FLYWAY_USER: *POSTGRES_USER
      FLYWAY_PASSWORD: *POSTGRES_PASSWORD
      FLYWAY_BASELINE_ON_MIGRATE: true
      FLYWAY_DEFAULT_SCHEMA: users
    depends_on:
      database:
        condition: service_healthy

  schemaspy:
    image: schemaspy/schemaspy:7.0.2
    profiles: ["schemaspy"]
    container_name: schemaspy
    command: -t pgsql11 -db postgres -host database -port 5432 -u postgres -p default -schemas users
    depends_on:
      migrations:
        condition: service_completed_successfully
    volumes: ["./output:/output"]

  backend:
    container_name: backend
    depends_on:
      migrations:
        condition: service_started
    entrypoint: sh -c "npm i && npm run start:dev"
    environment:
      <<: *postgres-vars
      NODE_ENV: development
    image: *node-image
    ports: ["3001:3000"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api"]
    working_dir: "/app"
    volumes: ["./backend:/app", "/app/node_modules"]

  frontend:
    container_name: frontend
    entrypoint: sh -c "npm ci --ignore-scripts && npm run dev"
    environment:
      BACKEND_URL: http://backend:3000
      PORT: 3000
      NODE_ENV: development
    image: *node-image
    ports: ["3000:3000"]
    volumes: ["./frontend:/app", "/app/node_modules"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
    working_dir: "/app"
    depends_on:
      backend:
        condition: service_healthy

  caddy:
    container_name: caddy
    profiles: ["caddy"]
    build: ./frontend
    environment:
      NODE_ENV: development
      PORT: 3000
      BACKEND_URL: http://backend:3000
      LOG_LEVEL: info
    ports: ["3005:3000"]
    volumes: ["./frontend/Caddyfile:/etc/caddy/Caddyfile"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
    depends_on:
      backend:
        condition: service_healthy

  # Kong API Gateway
  kong-migrations:
    image: kong:3.7-alpine
    container_name: kong-migrations
    command: kong migrations bootstrap
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: database
      KONG_PG_USER: *POSTGRES_USER
      KONG_PG_PASSWORD: *POSTGRES_PASSWORD
      KONG_PG_DATABASE: kong
      KONG_PG_PORT: 5432
    depends_on:
      database:
        condition: service_healthy
    profiles: ["kong"]

  kong:
    image: kong:3.7-alpine
    container_name: kong
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: database
      KONG_PG_USER: *POSTGRES_USER
      KONG_PG_PASSWORD: *POSTGRES_PASSWORD
      KONG_PG_DATABASE: kong
      KONG_PG_PORT: 5432
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    ports:
      - "8000:8000" # Proxy port
      - "8001:8001" # Admin API port
    depends_on:
      kong-migrations:
        condition: service_completed_successfully
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: ["kong"]

  # Kong Admin UI (optional, for managing routes/consumers)
  konga:
    image: pantsel/konga:latest
    container_name: konga
    environment:
      NODE_ENV: production
      DB_ADAPTER: postgres
      DB_HOST: database
      DB_USER: *POSTGRES_USER
      DB_PASSWORD: *POSTGRES_PASSWORD
      DB_DATABASE: konga
      DB_PORT: 5432
    ports:
      - "1337:1337" # Konga UI
    depends_on:
      kong:
        condition: service_healthy
    profiles: ["kong"]

  # Kong Seed Data - Creates test tenants and API keys
  kong-seed:
    image: curlimages/curl:latest
    container_name: kong-seed
    entrypoint: /bin/sh
    command: /kong-seed.sh
    volumes:
      - ./kong-seed.sh:/kong-seed.sh:ro
    depends_on:
      kong:
        condition: service_healthy
    profiles: ["kong"]
