name: Merge

on:
  push:
    branches: [main, crunchy-demo]
    paths-ignore:
      - '*.md'
      - '.github/**'
      - '.github/graphics/**'
      - '!.github/workflows/**'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag set to deploy; e.g. PR number or prod'
        type: string
        default: 'prod'

concurrency:
  # Do not interrupt previous workflows
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions: {}

jobs:
  builds:
    name: Builds
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        package: [backend, frontend, migrations]
    timeout-minutes: 10
    steps:
      - uses: bcgov/action-builder-ghcr@2b24ac7f95e6a019064151498660437cca3202c5 # v4.2.1
        with:
          package: ${{ matrix.package }}
          tags: dev
          tag_fallback: latest
          triggers: ('${{ matrix.package }}/')

  import:
    name: Import to ImageStream
    needs: [builds]
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        package: [backend, frontend, migrations]
    steps:
      - name: Import image to OpenShift ImageStream
        uses: bcgov/action-oc-runner@d2fc921aaa9d70684c186dbb7754e6985d44d86f # v1.4.1
        with:
          oc_namespace: f6bc3f-tools
          oc_token: ${{ secrets.OC_TOKEN_TOOLS }}
          oc_server: https://api.silver.devops.gov.bc.ca:6443
          commands: |
            # Import dev tag
            oc tag ghcr.io/${{ github.repository }}/${{ matrix.package }}:dev ${{ matrix.package }}:dev --source=docker --reference-policy=local
            # Tag as test for TEST environment
            oc tag ${{ matrix.package }}:dev ${{ matrix.package }}:test

  deploy-dev:
    name: Deploy (DEV)
    needs: [import]
    uses: ./.github/workflows/.deployer.yml
    secrets: inherit
    with:
      oc_server: ${{ vars.oc_server }}
      db_user: appproxy # appproxy is the user which works with pgbouncer.
      params: --set frontend.secrets.enabled=false
      tag: dev

  deploy-test:
    name: Deploy (TEST)
    needs: [import]
    uses: ./.github/workflows/.deployer.yml
    secrets:
      oc_namespace: ${{ secrets.OC_NAMESPACE }}
      oc_token: ${{ secrets.OC_TOKEN }}
    with:
      environment: TEST
      oc_server: ${{ vars.oc_server }}
      db_user: appproxy # appproxy is the user which works with pgbouncer.
      params: --set frontend.secrets.enabled=false
      tag: test

  promote-test:
    name: Promote Images to PROD
    needs: [deploy-test]
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        package: [backend, frontend, migrations]
    steps:
      - name: Tag images for PROD
        uses: bcgov/action-oc-runner@d2fc921aaa9d70684c186dbb7754e6985d44d86f # v1.4.1
        with:
          oc_namespace: f6bc3f-tools
          oc_token: ${{ secrets.OC_TOKEN_TOOLS }}
          oc_server: https://api.silver.devops.gov.bc.ca:6443
          commands: |
            # Tag test images as prod for PROD environment
            oc tag ${{ matrix.package }}:test ${{ matrix.package }}:prod

  deploy-prod:
    name: Deploy (PROD)
    needs: [promote-test]
    uses: ./.github/workflows/.deployer.yml
    secrets:
      oc_namespace: ${{ secrets.OC_NAMESPACE }}
      oc_token: ${{ secrets.OC_TOKEN }}
    with:
      environment: PROD
      oc_server: ${{ vars.oc_server }}
      db_user: appproxy # appproxy is the user which works with pgbouncer.
      params: --set frontend.secrets.enabled=false
      timeout-minutes: 15
      tag: prod
