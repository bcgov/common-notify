name: Merge

on:
  push:
    branches: [main, crunchy-demo]
    paths-ignore:
      - '*.md'
      - '.github/**'
      - '.github/graphics/**'
      - '!.github/workflows/**'
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag set to deploy; e.g. PR number or prod"
        type: string
        default: 'prod'

concurrency:
  # Do not interrupt previous workflows
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions: {}

jobs:
  builds:
    name: Builds
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        package: [backend, frontend, migrations]
    timeout-minutes: 10
    steps:
      - uses: bcgov/action-builder-ghcr@2b24ac7f95e6a019064151498660437cca3202c5 # v4.2.1
        with:
          package: ${{ matrix.package }}
          tags: dev
          tag_fallback: latest
          triggers: ('${{ matrix.package }}/')

  import:
    name: Import to ImageStream
    needs: [builds]
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        package: [backend, frontend, migrations]
    steps:
      - name: Import image to OpenShift ImageStream
        uses: bcgov/action-oc-runner@d2fc921aaa9d70684c186dbb7754e6985d44d86f # v1.4.1
        with:
          oc_namespace: f6bc3f-tools
          oc_token: ${{ secrets.OC_TOKEN_TOOLS }}
          oc_server: https://api.silver.devops.gov.bc.ca:6443
          commands: |
            # Import dev tag
            oc tag ghcr.io/${{ github.repository }}/${{ matrix.package }}:dev ${{ matrix.package }}:dev --source=docker --reference-policy=local
            # Tag as test for TEST environment
            oc tag ${{ matrix.package }}:dev ${{ matrix.package }}:test

  gateway-product:
    name: Apply Gateway Product Config
    needs: [import]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Generate product config
        run: |
          chmod +x api-gateway/scripts/generate-product-config.sh
          api-gateway/scripts/generate-product-config.sh
      - name: Apply product config
        env:
          GWA_ACCT: ${{ secrets.GWA_ACCT }}
        run: |
          curl -L https://github.com/bcgov/gwa-cli/releases/download/v3.0.7/gwa_Linux_x86_64.tgz | tar -xz
          sudo mv gwa /usr/local/bin/
          CLIENT_ID=$(echo "$GWA_ACCT" | jq -r '.client_id')
          CLIENT_SECRET=$(echo "$GWA_ACCT" | jq -r '.client_secret')
          gwa login --client-id "$CLIENT_ID" --client-secret "$CLIENT_SECRET"
          gwa config set gateway gw-fe8c5
          gwa apply -i api-gateway/generated/gw-product.yaml

  gateway-config-dev:
    name: Apply Gateway Config (DEV)
    needs: [gateway-product]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Generate gateway config for DEV
        run: |
          chmod +x api-gateway/scripts/generate-config.sh
          api-gateway/scripts/generate-config.sh dev common-notify-dev
      - name: Apply gateway config
        env:
          GWA_ACCT: ${{ secrets.GWA_ACCT }}
        run: |
          curl -L https://github.com/bcgov/gwa-cli/releases/download/v3.0.7/gwa_Linux_x86_64.tgz | tar -xz
          sudo mv gwa /usr/local/bin/
          CLIENT_ID=$(echo "$GWA_ACCT" | jq -r '.client_id')
          CLIENT_SECRET=$(echo "$GWA_ACCT" | jq -r '.client_secret')
          gwa login --client-id "$CLIENT_ID" --client-secret "$CLIENT_SECRET"
          gwa config set gateway gw-fe8c5
          gwa apply -i api-gateway/generated/gw-routes-dev.yaml

  deploy-dev:
    name: Deploy (DEV)
    needs: [gateway-config-dev]
    uses: ./.github/workflows/.deployer.yml
    secrets: inherit
    with:
      environment: DEV
      oc_server: ${{ vars.oc_server }}
      db_user: appproxy # appproxy is the user which works with pgbouncer.
      params: --set frontend.secrets.enabled=false
      db_triggers: ('charts/crunchy/')
      tag: dev

  gateway-config-test:
    name: Apply Gateway Config (TEST)
    needs: [gateway-product]
    runs-on: ubuntu-24.04
    environment: TEST
    steps:
      - uses: actions/checkout@v4
      - name: Generate gateway config for TEST
        run: |
          chmod +x api-gateway/scripts/generate-config.sh
          api-gateway/scripts/generate-config.sh test
      - name: Apply gateway config
        env:
          GWA_ACCT: ${{ secrets.GWA_ACCT }}
        run: |
          curl -L https://github.com/bcgov/gwa-cli/releases/download/v3.0.7/gwa_Linux_x86_64.tgz | tar -xz
          sudo mv gwa /usr/local/bin/
          CLIENT_ID=$(echo "$GWA_ACCT" | jq -r '.client_id')
          CLIENT_SECRET=$(echo "$GWA_ACCT" | jq -r '.client_secret')
          gwa login --client-id "$CLIENT_ID" --client-secret "$CLIENT_SECRET"
          gwa config set gateway gw-fe8c5
          gwa apply -i api-gateway/generated/gw-routes-test.yaml

  deploy-test:
    name: Deploy (TEST)
    needs: [gateway-config-test]
    uses: ./.github/workflows/.deployer.yml
    secrets: inherit
    with:
      environment: TEST
      oc_server: ${{ vars.oc_server }}
      db_user: appproxy # appproxy is the user which works with pgbouncer.
      params: --set frontend.secrets.enabled=false
      db_triggers: ('charts/crunchy/')
      tag: test

  promote-test:
    name: Promote Images to PROD
    needs: [deploy-test]
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        package: [backend, frontend, migrations]
    steps:
      - name: Tag images for PROD
        uses: bcgov/action-oc-runner@d2fc921aaa9d70684c186dbb7754e6985d44d86f # v1.4.1
        with:
          oc_namespace: f6bc3f-tools
          oc_token: ${{ secrets.OC_TOKEN_TOOLS }}
          oc_server: https://api.silver.devops.gov.bc.ca:6443
          commands: |
            # Tag test images as prod for PROD environment
            oc tag ${{ matrix.package }}:test ${{ matrix.package }}:prod

  gateway-config-prod:
    name: Apply Gateway Config (PROD)
    needs: [promote-test]
    runs-on: ubuntu-24.04
    environment: PROD
    steps:
      - uses: actions/checkout@v4
      - name: Generate gateway config for PROD
        run: |
          chmod +x api-gateway/scripts/generate-config.sh
          api-gateway/scripts/generate-config.sh prod
      - name: Apply gateway config
        env:
          GWA_ACCT: ${{ secrets.GWA_ACCT }}
        run: |
          curl -L https://github.com/bcgov/gwa-cli/releases/download/v3.0.7/gwa_Linux_x86_64.tgz | tar -xz
          sudo mv gwa /usr/local/bin/
          CLIENT_ID=$(echo "$GWA_ACCT" | jq -r '.client_id')
          CLIENT_SECRET=$(echo "$GWA_ACCT" | jq -r '.client_secret')
          gwa login --client-id "$CLIENT_ID" --client-secret "$CLIENT_SECRET"
          gwa config set gateway gw-fe8c5
          gwa apply -i api-gateway/generated/gw-routes-prod.yaml

  deploy-prod:
    name: Deploy (PROD)
    needs: [gateway-config-prod]
    uses: ./.github/workflows/.deployer.yml
    secrets: inherit
    with:
      environment: PROD
      oc_server: ${{ vars.oc_server }}
      db_user: appproxy # appproxy is the user which works with pgbouncer.
      params: --set backend.deploymentStrategy=RollingUpdate --set frontend.deploymentStrategy=RollingUpdate --set global.autoscaling=true --set frontend.pdb.enabled=true --set backend.pdb.enabled=true
      db_triggers: ('charts/crunchy/')
      tag: prod
      timeout-minutes: 15
