name: Deploy CrunchyDB

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy-crunchydb:
    name: Deploy CrunchyDB
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3