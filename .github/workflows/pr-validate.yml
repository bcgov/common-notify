name: PR Validate

on:
  pull_request:
    types: [edited, opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-edit-${{ github.event.number }}
  cancel-in-progress: true

permissions: {}

jobs:

  validate:
    name: Validate PR
    if: (! github.event.pull_request.draft)
    permissions:
      pull-requests: write
    uses: bcgov/quickstart-openshift-helpers/.github/workflows/.pr-validate.yml@ca6579bdadf383a2513397081f963889b92823a4 # v1.1.0
    with:
      markdown_links: |
        - [Frontend](https://${{ github.event.repository.name }}-${{ github.event.number }}.apps.silver.devops.gov.bc.ca)
        - [Backend](https://${{ github.event.repository.name }}-${{ github.event.number }}.apps.silver.devops.gov.bc.ca/api)

  typescript-validation:
    name: TypeScript Build & Test
    if: (! github.event.pull_request.draft)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install, lint, test, and build backend
        working-directory: backend
        run: |
          npm ci
          npm run lint
          npm test
          npm run build

      - name: Install, lint, test, and build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run lint
          npm test
          npm run build

  results:
    name: Validate Results
    if: always()
    needs: [validate, typescript-validation]
    runs-on: ubuntu-slim
    steps:
      - run: echo "Success!"