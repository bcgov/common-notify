name: PR Closed

on:
  pull_request:
    types: [closed]

concurrency:
  # PR open and close use the same group, allowing only one at a time
  group: ${{ github.event.number }}
  cancel-in-progress: true

permissions: {}

jobs:
  cleanup:
    name: Cleanup and Image Promotion
    uses: bcgov/quickstart-openshift-helpers/.github/workflows/.pr-close.yml@ca6579bdadf383a2513397081f963889b92823a4 # v1.1.0
    permissions:
      packages: write
    secrets:
      oc_namespace: ${{ secrets.OC_DEV_NAMESPACE }}
      oc_token: ${{ secrets.OC_DEV_TOKEN }}
      oc_server: https://api.silver.devops.gov.bc.ca:6443
    with:
      cleanup: helm
      packages: backend frontend migrations

  cleanup_db: # TODO move it off to another action later.
    name: Remove DB User from Crunchy
    runs-on: ubuntu-slim
    steps:
      - uses: bcgov/action-crunchy@v1.2.6
        name: Remove PR Specific User
        with:
          oc_namespace: ${{ secrets.OC_DEV_NAMESPACE }}
          oc_token: ${{ secrets.OC_DEV_TOKEN }}
          oc_server: https://api.silver.devops.gov.bc.ca:6443
          values_file: charts/crunchy/values.yml

  cleanup_gateway:
    name: Delete PR API Gateway Config
    runs-on: ubuntu-24.04
    concurrency:
      group: gateway-config-apply
      cancel-in-progress: false  # Queue instead of canceling
    steps:
      - uses: actions/checkout@v4

      - name: Generate gateway config (dev+test+prod only)
        run: |
          chmod +x api-gateway/scripts/generate-gateway-config.sh
          # Generate combined services file with dev+test+prod (excludes PR)
          api-gateway/scripts/generate-gateway-config.sh all

      - name: Remove PR service by applying permanent services
        env:
          GWA_ACCT: ${{ secrets.GWA_ACCT }}
        run: |
          # Install gwa CLI
          curl -L https://github.com/bcgov/gwa-cli/releases/download/v3.0.7/gwa_Linux_x86_64.tgz | tar -xz
          sudo mv gwa /usr/local/bin/

          # Login to API Gateway with service account credentials
          CLIENT_ID=$(echo "$GWA_ACCT" | jq -r '.client_id')
          CLIENT_SECRET=$(echo "$GWA_ACCT" | jq -r '.client_secret')
          gwa login --client-id "$CLIENT_ID" --client-secret "$CLIENT_SECRET"

          # Set gateway context
          gwa config set gateway gw-fe8c5

          # Apply permanent services (dev+test+prod) - this will remove PR service
          gwa apply -i api-gateway/generated/gw-services-all.yaml

      - name: Wait for PR service deletion
        env:
          GWA_ACCT: ${{ secrets.GWA_ACCT }}
        run: |
          # Define PR service name
          PR_SERVICE_NAME="nr-notify-pr-${{ github.event.number }}"

          echo "Waiting for service '$PR_SERVICE_NAME' to be deleted..."

          # Maximum wait time in seconds (5 minutes)
          MAX_WAIT=300
          ELAPSED=0
          INTERVAL=10

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            # Get list of services and check if PR service still exists
            SERVICES=$(gwa status | grep -c "$PR_SERVICE_NAME" || true)

            if [ "$SERVICES" -eq 0 ]; then
              echo "✓ Service '$PR_SERVICE_NAME' has been successfully deleted"
              exit 0
            fi

            echo "Service still exists. Waiting ${INTERVAL}s... (${ELAPSED}s/${MAX_WAIT}s elapsed)"
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          echo "Warning: Timeout waiting for service deletion after ${MAX_WAIT}s"
          echo "Service may still exist in the gateway"
          exit 1
