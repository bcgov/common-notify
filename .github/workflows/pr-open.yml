name: PR

on:
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.devcontainer/**'
      - 'LICENSE'

concurrency:
  # Cancel in progress for PR open and close
  group: ${{ github.event.number }}
  cancel-in-progress: true

permissions: {}

jobs:
  # https://github.com/bcgov/action-builder-ghcr
  builds:
    name: Builds
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        package: [backend, frontend, migrations]
    timeout-minutes: 10
    steps:
      - uses: bcgov/action-builder-ghcr@2b24ac7f95e6a019064151498660437cca3202c5 # v4.2.1
        with:
          package: ${{ matrix.package }}
          tags: ${{ github.event.number }}
          tag_fallback: latest
          triggers: ('${{ matrix.package }}/')

  import:
    name: Import to ImageStream
    needs: [builds]
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        package: [backend, frontend, migrations]
    steps:
      - name: Import image to OpenShift ImageStream
        uses: bcgov/action-oc-runner@d2fc921aaa9d70684c186dbb7754e6985d44d86f # v1.4.1
        with:
          oc_namespace: f6bc3f-tools
          oc_token: ${{ secrets.OC_TOKEN_TOOLS }}
          oc_server: https://api.silver.devops.gov.bc.ca:6443
          commands: |
            oc tag ghcr.io/${{ github.repository }}/${{ matrix.package }}:${{ github.event.number }} ${{ matrix.package }}:${{ github.event.number }} --source=docker --reference-policy=local

  gateway-config:
    name: Apply API Gateway Config
    needs: [import]
    runs-on: ubuntu-24.04
    concurrency:
      group: gateway-config-apply
      cancel-in-progress: false  # Queue instead of canceling
    steps:
      - uses: actions/checkout@v4

      - name: Generate gateway config for PR + permanent services
        run: |
          chmod +x api-gateway/scripts/generate-gateway-config.sh
          # Generate combined config with PR + permanent services (dev+test+prod)
          api-gateway/scripts/generate-gateway-config.sh pr-with-permanent common-notify-${{ github.event.number }}

      - name: Apply gateway config
        env:
          GWA_ACCT: ${{ secrets.GWA_ACCT }}
        run: |
          # Install gwa CLI
          curl -L https://github.com/bcgov/gwa-cli/releases/download/v3.0.7/gwa_Linux_x86_64.tgz | tar -xz
          sudo mv gwa /usr/local/bin/

          # Login to API Gateway with service account credentials
          CLIENT_ID=$(echo "$GWA_ACCT" | jq -r '.client_id')
          CLIENT_SECRET=$(echo "$GWA_ACCT" | jq -r '.client_secret')
          gwa login --client-id "$CLIENT_ID" --client-secret "$CLIENT_SECRET"

          # Set gateway context
          gwa config set gateway gw-fe8c5

          # Apply PR + permanent services (prevents deletion of dev/test/prod)
          gwa apply -i api-gateway/generated/gw-services-pr-with-permanent.yaml

  deploys:
    name: Deploys (${{ github.event.number }})
    needs: [gateway-config]
    uses: ./.github/workflows/.deployer.yml
    secrets: inherit
    with:
      oc_server: ${{ vars.oc_server }}
      tag: ${{ github.event.number }}
      db_user: app-${{ github.event.number }}
      params: --set global.secrets.persist=false --set frontend.secrets.enabled=false
      triggers: ('backend/' 'frontend/' 'migrations/' 'charts/' '.github/workflows/.deployer.yml')
      db_triggers: ('charts/crunchy/')
      redis_triggers: ('charts/redis/')

  tests:
    name: Tests
    if: needs.deploys.outputs.triggered == 'true'
    needs: [deploys]
    uses: ./.github/workflows/.tests.yml
    secrets:
      E2E_TEST_CLIENT_ID: ${{ secrets.E2E_TEST_CLIENT_ID }}
      E2E_TEST_CLIENT_SECRET: ${{ secrets.E2E_TEST_CLIENT_SECRET }}

  results:
    name: PR Results
    needs: [builds, deploys, tests]
    if: always()
    runs-on: ubuntu-slim
    steps:
      - if: contains(needs.*.result, 'failure')||contains(needs.*.result, 'canceled')
        run: echo "At least one job has failed." && exit 1
      - run: echo "Success!"
