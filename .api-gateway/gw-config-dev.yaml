# ========================================
# UI SERVICE (Frontend)
# ========================================
kind: GatewayService
name: coco-notify-ui-dev
tags: [ns.gw-fe8c5]
url: http://notify-frontend.namespace.svc.cluster.local
protocol: http

routes:
  - name: coco-notify-dev-ui
    tags: [ns.gw-fe8c5, aps.route.session.cookie.enabled]
    hosts:
      - coco-notify-gateway.dev.api.gov.bc.ca
    paths:
      - /
    methods:
      - GET
      - OPTIONS
    strip_path: false

    plugins:
      - enabled: true
        name: oidc
        tags: [ns.gw-fe8c5]
        config:
          discovery: https://dev.loginproxy.gov.bc.ca/auth/realms/standard/.well-known/openid-configuration

          client_id: notify-6386
          client_secret: 

          response_type: code
          scope: openid

          bearer_only: 'no'
          unauth_action: auth

          redirect_uri: https://coco-notify-gateway.dev.api.gov.bc.ca/sso
          redirect_after_logout_uri: /

          logout_path: /logout
          revoke_tokens_on_logout: 'yes'

          session_secure: 'yes'
          ssl_verify: 'no'

          header_claims:
            - idir_username
            - email
          header_names:
            - X-Idir-Username
            - X-User-Email

          disable_access_token_header: 'yes'
          disable_id_token_header: 'yes'
          disable_userinfo_header: 'yes'

          token_endpoint_auth_method: client_secret_post
          use_jwks: 'yes'


# ========================================
# ADMIN API SERVICE (SSO / JWT)
# ========================================
---
kind: GatewayService
name: coco-notify-admin-dev
tags: [ns.gw-fe8c5]
url: http://notify-admin-api.namespace.svc.cluster.local
protocol: http

routes:
  - name: coco-notify-dev-admin
    tags: [ns.gw-fe8c5]
    hosts:
      - coco-notify-gateway.dev.api.gov.bc.ca
    paths:
      - /admin
    methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    strip_path: false

    plugins:
      - enabled: true
        name: oidc
        tags: [ns.gw-fe8c5]
        config:
          discovery: https://dev.loginproxy.gov.bc.ca/auth/realms/standard/.well-known/openid-configuration

          client_id: notify-6386
          client_secret: 

          bearer_only: 'no'
          unauth_action: auth

          scope: openid

          session_secure: 'yes'
          ssl_verify: 'no'
          use_jwks: 'yes'


# ========================================
# PUBLIC API SERVICE (API KEYS ONLY)
# ========================================
---
kind: GatewayService
name: coco-notify-api-dev
tags: [ns.gw-fe8c5]
url: http://notify-api.namespace.svc.cluster.local
protocol: http

routes:
  - name: coco-notify-dev-api
    tags: [ns.gw-fe8c5]
    hosts:
      - coco-notify-gateway.dev.api.gov.bc.ca
    paths:
      - /api
    regex_priority: 100
    methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    strip_path: false

    plugins:
      - enabled: true
        name: key-auth
        tags: [ns.gw-fe8c5]
        config:
          key_names:
            - x-api-key
          hide_credentials: true
